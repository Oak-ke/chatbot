services:
  chatbot:
    build: .
    container_name: chatbot
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - app-network
    restart: always

  redis:
    image: redis:7
    container_name: redis
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
