services:
  chatbot:
    build: .
    container_name: chatbot
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7
    container_name: redis
    # ports:
    #   - "6379:6379"
    restart: always
